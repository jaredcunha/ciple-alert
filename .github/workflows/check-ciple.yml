name: Check CIPLE US Exam Listings

on:
  schedule:
    - cron: "0 10 * * *"  # 10:00 UTC daily (6am ET / 3am PT)
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send test email even if nothing changed"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run checker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify || 'false' }}
        run: python check_dates.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update CIPLE state [skip ci]"
          git push
